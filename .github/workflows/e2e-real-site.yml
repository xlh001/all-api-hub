name: Real-Site E2E

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 19 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-site-e2e:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: New API
            env_prefix: NEW_API
            spec: e2e/realSite/newApiAccountAdd.spec.ts
          - label: OneHub
            env_prefix: ONE_HUB
            spec: e2e/realSite/oneHubAccountAdd.spec.ts
          - label: DoneHub
            env_prefix: DONE_HUB
            spec: e2e/realSite/doneHubAccountAdd.spec.ts
          - label: Veloera
            env_prefix: VELOERA
            spec: e2e/realSite/veloeraAccountAdd.spec.ts
          - label: Sub2API
            env_prefix: SUB2API
            spec: e2e/realSite/sub2apiAccountAdd.spec.ts
          - label: Nutstore WebDAV
            env_prefix: NUTSTORE_WEBDAV
            kind: webdav
            provider_name: Nutstore
            provider_account_prefix: nutstore
            spec: e2e/realSite/webdavProviderFlow.spec.ts

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build extension
        run: pnpm build:e2e

      - name: Get Playwright version
        id: playwright_version
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log('version=' + (pkg.devDependencies?.['@playwright/test'] ?? 'unknown'))" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Export selected real-site environment
        env:
          REAL_SITE_ENV_PREFIX: ${{ matrix.env_prefix }}
          REAL_SITE_BASE_URL: ${{ secrets[format('AAH_E2E_{0}_BASE_URL', matrix.env_prefix)] }}
          REAL_SITE_USERNAME: ${{ secrets[format('AAH_E2E_{0}_USERNAME', matrix.env_prefix)] }}
          REAL_SITE_PASSWORD: ${{ secrets[format('AAH_E2E_{0}_PASSWORD', matrix.env_prefix)] }}
          REAL_SITE_TOTP_SECRET: ${{ secrets[format('AAH_E2E_{0}_TOTP_SECRET', matrix.env_prefix)] }}
          REAL_SITE_LOGIN_PATH: ${{ secrets[format('AAH_E2E_{0}_LOGIN_PATH', matrix.env_prefix)] }}
          REAL_SITE_LOGIN_API_PATH: ${{ secrets[format('AAH_E2E_{0}_LOGIN_API_PATH', matrix.env_prefix)] }}
          REAL_SITE_LOGIN_2FA_API_PATH: ${{ secrets[format('AAH_E2E_{0}_LOGIN_2FA_API_PATH', matrix.env_prefix)] }}
          REAL_SITE_USERNAME_SELECTOR: ${{ secrets[format('AAH_E2E_{0}_USERNAME_SELECTOR', matrix.env_prefix)] }}
          REAL_SITE_PASSWORD_SELECTOR: ${{ secrets[format('AAH_E2E_{0}_PASSWORD_SELECTOR', matrix.env_prefix)] }}
          REAL_SITE_SUBMIT_SELECTOR: ${{ secrets[format('AAH_E2E_{0}_SUBMIT_SELECTOR', matrix.env_prefix)] }}
          REAL_SITE_AGREE_SELECTOR: ${{ secrets[format('AAH_E2E_{0}_AGREE_SELECTOR', matrix.env_prefix)] }}
          REAL_SITE_KIND: ${{ matrix.kind || 'account' }}
          WEBDAV_PROVIDER_NAME: ${{ matrix.provider_name }}
          WEBDAV_PROVIDER_ACCOUNT_PREFIX: ${{ matrix.provider_account_prefix }}
          WEBDAV_URL: ${{ secrets[format('AAH_E2E_{0}_URL', matrix.env_prefix)] }}
          WEBDAV_USERNAME: ${{ secrets[format('AAH_E2E_{0}_USERNAME', matrix.env_prefix)] }}
          WEBDAV_PASSWORD: ${{ secrets[format('AAH_E2E_{0}_PASSWORD', matrix.env_prefix)] }}
        run: |
          write_env() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf '%s=%s\n' "$key" "$value" >> "$GITHUB_ENV"
            fi
          }

          prefix="$REAL_SITE_ENV_PREFIX"
          missing=()
          if [ "$REAL_SITE_KIND" = "webdav" ]; then
            write_env "AAH_E2E_WEBDAV_PROVIDER_PREFIX" "$prefix"
            write_env "AAH_E2E_WEBDAV_PROVIDER_NAME" "$WEBDAV_PROVIDER_NAME"
            write_env "AAH_E2E_WEBDAV_ACCOUNT_PREFIX" "$WEBDAV_PROVIDER_ACCOUNT_PREFIX"
            write_env "AAH_E2E_WEBDAV_URL" "$WEBDAV_URL"
            write_env "AAH_E2E_WEBDAV_USERNAME" "$WEBDAV_USERNAME"
            write_env "AAH_E2E_WEBDAV_PASSWORD" "$WEBDAV_PASSWORD"
            [ -z "$WEBDAV_URL" ] && missing+=("AAH_E2E_${prefix}_URL")
            [ -z "$WEBDAV_USERNAME" ] && missing+=("AAH_E2E_${prefix}_USERNAME")
            [ -z "$WEBDAV_PASSWORD" ] && missing+=("AAH_E2E_${prefix}_PASSWORD")
          else
            write_env "AAH_E2E_${prefix}_BASE_URL" "$REAL_SITE_BASE_URL"
            write_env "AAH_E2E_${prefix}_USERNAME" "$REAL_SITE_USERNAME"
            write_env "AAH_E2E_${prefix}_PASSWORD" "$REAL_SITE_PASSWORD"
            write_env "AAH_E2E_${prefix}_TOTP_SECRET" "$REAL_SITE_TOTP_SECRET"
            write_env "AAH_E2E_${prefix}_LOGIN_PATH" "$REAL_SITE_LOGIN_PATH"
            write_env "AAH_E2E_${prefix}_LOGIN_API_PATH" "$REAL_SITE_LOGIN_API_PATH"
            write_env "AAH_E2E_${prefix}_LOGIN_2FA_API_PATH" "$REAL_SITE_LOGIN_2FA_API_PATH"
            write_env "AAH_E2E_${prefix}_USERNAME_SELECTOR" "$REAL_SITE_USERNAME_SELECTOR"
            write_env "AAH_E2E_${prefix}_PASSWORD_SELECTOR" "$REAL_SITE_PASSWORD_SELECTOR"
            write_env "AAH_E2E_${prefix}_SUBMIT_SELECTOR" "$REAL_SITE_SUBMIT_SELECTOR"
            write_env "AAH_E2E_${prefix}_AGREE_SELECTOR" "$REAL_SITE_AGREE_SELECTOR"
            [ -z "$REAL_SITE_BASE_URL" ] && missing+=("AAH_E2E_${prefix}_BASE_URL")
            [ -z "$REAL_SITE_USERNAME" ] && missing+=("AAH_E2E_${prefix}_USERNAME")
            [ -z "$REAL_SITE_PASSWORD" ] && missing+=("AAH_E2E_${prefix}_PASSWORD")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::${prefix} real-site E2E will skip without required secrets: ${missing[*]}"
          else
            echo "${prefix} real-site E2E required secrets are configured."
          fi

      - name: Run real-site E2E
        env:
          AAH_SKIP_E2E_BUILD: "1"
        run: pnpm exec playwright test ${{ matrix.spec }} --project=chromium --reporter=list

      - name: Upload Playwright artifacts (failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: real-site-playwright-report-${{ matrix.env_prefix }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
