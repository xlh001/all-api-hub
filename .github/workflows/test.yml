name: Test

on:
  push:
    branches: [main, develop, test/**]
    paths:
      - "src/**"
      - "public/**"
      - "plugins/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "i18next.config.ts"
      - "scripts/run-i18n-check-if-staged.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "wxt.config.ts"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "plugins/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "i18next.config.ts"
      - "scripts/run-i18n-check-if-staged.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "wxt.config.ts"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run i18n extract check
        run: pnpm run i18n:extract:ci

      - name: Run tests with coverage
        run: pnpm test:ci

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          echo "Coverage report generated. See artifacts for detailed results."
