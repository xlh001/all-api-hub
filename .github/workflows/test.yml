name: Test

on:
  push:
    branches: [main, develop, test/**]
    paths:
      - "src/**"
      - "public/**"
      - "plugins/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "knip.ts"
      - "i18next.config.ts"
      - "scripts/run-i18n-check-if-staged.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "wxt.config.ts"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "plugins/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "knip.ts"
      - "i18next.config.ts"
      - "scripts/run-i18n-check-if-staged.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "wxt.config.ts"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run type check
        run: pnpm compile

      - name: Run lint
        run: pnpm lint

      - name: Run knip
        run: pnpm knip

      - name: Run i18n extract check
        run: pnpm run i18n:extract:ci

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run tests with coverage
        run: pnpm exec vitest --run --coverage --reporter=default --reporter=junit --outputFile=test-report.junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          echo "Coverage report generated. See artifacts for detailed results."
