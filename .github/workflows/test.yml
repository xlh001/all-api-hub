name: Test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "src/**"
      - "public/**"
      - "plugins/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "knip.ts"
      - "i18next.config.ts"
      - "scripts/run-i18n-check-if-staged.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "wxt.config.ts"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "plugins/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "knip.ts"
      - "i18next.config.ts"
      - "scripts/run-i18n-check-if-staged.mjs"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "wxt.config.ts"
      - ".github/workflows/test.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run type check
        run: pnpm compile

      - name: Run lint
        run: pnpm lint

      - name: Run knip
        run: pnpm knip

      - name: Run i18n extract check
        run: pnpm run i18n:extract:ci

      - name: Run i18n status check
        run: pnpm run i18n:status

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard:
          - index: 1
            total: 2
          - index: 2
            total: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run test shard with coverage
        run: >
          pnpm exec vitest --run --coverage
          --coverage.thresholds.statements=0
          --coverage.thresholds.branches=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.lines=0
          --reporter=default
          --reporter=blob
          --shard=${{ matrix.shard.index }}/${{ matrix.shard.total }}

      - name: Upload Vitest blob report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: vitest-blob-report-${{ matrix.shard.index }}
          path: .vitest-reports/*.json
          include-hidden-files: true
          retention-days: 1

  unit-tests-merge:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Download Vitest blob reports
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: .vitest-reports
          pattern: vitest-blob-report-*
          merge-multiple: true

      - name: Merge test and coverage reports
        run: >
          pnpm exec vitest --merge-reports=.vitest-reports --coverage
          --reporter=default
          --reporter=junit
          --outputFile.junit=test-report.junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
          files: test-report.junit.xml

      - name: Upload test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-report
          path: test-report.junit.xml
          retention-days: 7

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          echo "Coverage report generated. See artifacts for detailed results."
