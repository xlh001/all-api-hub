name: E2E Browser Compatibility

on:
  workflow_dispatch: {}
  schedule:
    - cron: "23 18 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chrome-compat:
    name: Chrome ${{ matrix.chrome_version }} compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # 114 is the current Chromium support floor for this build: the
          # manifest declares sidePanel, and chrome.sidePanel starts at 114.
          - chrome_version: "114"
          # 116 adds sidePanel.open and major MV3 service worker lifetime fixes.
          - chrome_version: "116"
          # 120 aligns chrome.alarms with the 30s MV3 service worker lifecycle.
          - chrome_version: "120"
          # 122 is a broad promise-support checkpoint for asynchronous extension APIs.
          - chrome_version: "122"
          # 144 has known community reports around extension messaging behavior.
          - chrome_version: "144"
          # 147 is the last pre-148 checkpoint before native browser namespace rollout.
          - chrome_version: "147"
          # 148 introduces native browser namespace and Promise-returning onMessage support.
          - chrome_version: "148"
          # stable catches the browser version users are most likely to auto-update to.
          - chrome_version: "stable"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build extension
        run: pnpm build:e2e

      - name: Setup Chrome ${{ matrix.chrome_version }}
        id: setup_chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: ${{ matrix.chrome_version }}
          install-dependencies: true

      - name: Run browser compatibility E2E
        timeout-minutes: 20
        env:
          AAH_E2E_CHROME_EXECUTABLE_PATH: ${{ steps.setup_chrome.outputs.chrome-path }}
          AAH_SKIP_E2E_BUILD: "1"
        run: pnpm run e2e:default

      - name: Upload Playwright artifacts (failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-browser-compat-${{ matrix.chrome_version }}-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
