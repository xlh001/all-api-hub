name: E2E Smoke

on:
  push:
    branches: [main, develop, test/**]
    paths:
      - "src/**"
      - "public/**"
      - "plugins/**"
      - "e2e/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "playwright.config.ts"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "wxt.config.ts"
      - ".github/workflows/e2e-smoke.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "public/**"
      - "plugins/**"
      - "e2e/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "playwright.config.ts"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "wxt.config.ts"
      - ".github/workflows/e2e-smoke.yml"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'skip-e2e') }}
    continue-on-error: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'e2e-optional') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build extension
        run: pnpm build:e2e

      - name: Get Playwright version
        id: playwright_version
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log('version=' + (pkg.devDependencies?.['@playwright/test'] ?? 'unknown'))" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright_version.outputs.version }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke
        run: pnpm e2e

      - name: Upload Playwright artifacts (failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-${{ github.run_attempt }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
