name: Feature Request / 功能请求
description: Tell us what would make All API Hub work better for you / 告诉我们什么能让 All API Hub 更适合您的使用
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to share an idea. Knowing a little about the context helps us understand the request more clearly and think about it in a way that is genuinely useful.

        感谢您愿意分享想法。多一点使用背景，会帮助我们更准确地理解这个需求，也更认真地思考怎样做才真正有帮助。

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description / 功能描述
      description: A clear and concise description of the feature you'd like to see / 清晰简洁地描述您希望看到的功能
      placeholder: Describe the feature... / 描述该功能...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Motivation / 使用场景 / 动机
      description: If you can share the situation behind this request, it helps us understand why it matters to you. / 如果您愿意补充这个需求背后的使用场景，会帮助我们理解它为什么对您重要。
      placeholder: |
        Why do you need this feature? What problem does it solve?
        为什么需要此功能？它解决什么问题？
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution / 建议的解决方案
      description: If you already have an idea for how this could work, we would love to hear it. If not, simply describe the outcome you hope for. / 如果您已经想过它大概可以怎么实现，欢迎直接告诉我们；如果还没有，也只需描述您希望达到的效果。
      placeholder: Describe your proposed solution... / 描述您建议的解决方案...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered / 考虑的替代方案
      description: What alternative solutions or features have you considered? / 您考虑过哪些替代解决方案或功能？
      placeholder: Describe any alternatives you've considered... / 描述您考虑过的任何替代方案...

  - type: dropdown
    id: browsers-affected
    attributes:
      label: Target Browsers / 目标浏览器
      description: Which browsers should this feature support? / 此功能应支持哪些浏览器？
      multiple: true
      options:
        - All browsers / 所有浏览器
        - Chrome
        - Firefox
        - Edge
        - Safari

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context / 其他信息
      description: Add any other context, screenshots, or mockups about the feature request here / 在此处添加有关功能请求的任何其他信息、截图或模型
      placeholder: Any additional information, screenshots, or mockups... / 任何其他信息、截图或模型...

