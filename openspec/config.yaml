schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform
context: |
  Project: All API Hub (中转站管理器)
  Repo type: WXT-based WebExtension; Chromium targets Manifest V3, Firefox ships Manifest V2 (MV3 build artifacts may exist for experimentation).

  Stack (verify against `package.json`)
  - Node.js >= 20, pnpm; scripts use `pnpm dev|build|test|lint|format|compile`.
  - WXT (`wxt`) + `@wxt-dev/module-react`; Vite config via `wxt.config.ts`.
  - React 19 + TypeScript (strict; `tsconfig.json` extends `.wxt/tsconfig.json` from `wxt prepare`).
    - WXT aliases: `~/...` resolve to `src/`; `~~/...` resolve to repo root.
  - Tailwind CSS v4 (dark mode uses `class`; config in `tailwind.config.js`).
  - UI primitives: Headless UI, Radix UI; shadcn-style components under `src/components/ui/`.
  - Async state: TanStack React Query.
  - i18n: i18next + react-i18next.
    - UI resources: `src/locales/<lang>/<namespace>.json` loaded via `import.meta.glob` (`src/utils/i18n/*`).
    - Manifest strings: `src/public/_locales/<lang>/messages.json` (served via WXT `publicDir`).
  - Storage: `@plasmohq/storage` wrapped by services (typically `new Storage({ area: "local" })`).
    - For read-modify-write flows, use `services/storageWriteLock.ts` to avoid cross-context races (popup/options/background).
  - Testing: Vitest (jsdom) + Testing Library; MSW for network mocking.
    - Global setup in `tests/setup.ts` uses `wxt/testing/fake-browser` and MSW server.
    - Use `tests/test-utils/render.tsx` for component tests (wraps providers + test i18n).
    - Coverage exists but threshold is intentionally low at the moment (see `CONTRIBUTING.md`).
  - Lint/format: ESLint flat config in `eslint.config.js` (TypeScript + React Hooks + JSDoc + import rules),
    Prettier config in `.prettierrc.mjs` (import sorting + Tailwind plugin).
    - Husky pre-commit runs `pnpm lint-staged` (`.husky/pre-commit`).

  Code conventions
  - Prefer `~/...` imports for `src/` code; use `~~/...` for repo-root tooling (tests/e2e/config).
  - Keep business logic + persistence in `src/services/`; keep UI components focused on rendering and calling services/hooks.
  - User-facing strings must be i18n’d; update `src/locales/` resources alongside UI changes.
  - Treat tokens/API keys/backups as secrets: don’t log them; don’t commit them; redact in examples.
  - Keep Firefox MV2 vs Chromium MV3 differences in mind:
    - MV3 uses `background.service_worker`; MV2 uses `background.scripts`.
    - Some APIs/permissions differ; guard browser-specific behavior via `env.browser` in `wxt.config.ts` or runtime checks.

  Important constraints
  - MV3 environment: background service worker, CSP, limited APIs; handle browser differences (Chrome/Edge vs Firefox).
  - Permissions: host access is broad (`<all_urls>`); optional permissions differ by browser.
  - Security/privacy: treat tokens/API keys and backups as sensitive; avoid logging secrets; never commit credentials.
  - Localization: UI copy must be translatable; update locale keys alongside UI changes.

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  design:
    - List the nearest existing helpers, services, hooks, components, or patterns and state whether the change should reuse, extend, or extract them before proposing new abstractions.
  tasks:
    - Start with a repo recon/reuse task that names the existing modules, abstractions, or UI patterns to inspect before implementation.
    - If implementation would duplicate nearby logic, add a scoped refactor or extraction task instead of a parallel implementation task.
    - When non-obvious logic or constraints are expected, note that implementation should add brief clarifying comments rather than relying on implicit knowledge.
    - Add an explicit verification section for every change. The minimum verification tasks must include `pnpm lint` and the smallest related automated test command for the touched behavior; prefer repo-native related/affected flows when available (for example `vitest related --run` or the direct equivalent of Husky/`lint-staged` validation without creating a commit), expand validation when shared hooks, services, utils, types, or contracts are touched, and require blockers to be documented if validation cannot run.
